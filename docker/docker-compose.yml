version: '3.8'


services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - payment-service-1
      - payment-service-2
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "50MB"


  payment-service-1:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: payment-service-1
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payments
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      PAYMENT_DEFAULT_URL: http://payment-processor-default:8080
      PAYMENT_FALLBACK_URL: http://payment-processor-fallback:8080
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "512MB"

  payment-service-2:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: payment-service-2
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payments
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      PAYMENT_DEFAULT_URL: http://payment-processor-default:8080
      PAYMENT_FALLBACK_URL: http://payment-processor-fallback:8080
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "512MB"

  postgres:
    image: postgres:17-alpine
    container_name: payment-service-db
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "200MB"

  redis:
    image: redis:7-alpine
    container_name: payment-service-redis
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "30MB"

networks:
  backend:
    driver: bridge
  payment-processor:
    name: payment-processor
    external: true

volumes:
  postgres-data: